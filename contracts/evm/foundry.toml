[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
solc = "0.8.26"
evm_version = "cancun"
via_ir = true

[profile.default.fuzz]
runs = 10000

[rpc_endpoints]
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC}"
arbitrum_one     = "${ARBITRUM_ONE_RPC}"

[etherscan]
arbitrum_one     = { key = "${ARBISCAN_KEY}", url = "https://api.arbiscan.io/api" }
arbitrum_sepolia = { key = "${ARBISCAN_KEY}", url = "https://api-sepolia.arbiscan.io/api" }

[dependencies]
"@openzeppelin/contracts" = "5.0.2"
