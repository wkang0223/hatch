# Fly.io config — NeuralMesh Ledger
# Deploy: fly deploy -c fly.ledger.toml --app neuralmesh-ledger
#
# Secrets to set before first deploy:
#   fly secrets set DATABASE_URL="postgres://..." INTERNAL_SECRET="..." -a neuralmesh-ledger

app            = "neuralmesh-ledger"
primary_region = "sin"
kill_signal    = "SIGTERM"
kill_timeout   = "30s"

[build]
  dockerfile = "infrastructure/Dockerfile.ledger"

[env]
  RUST_LOG         = "info"
  SQLX_OFFLINE     = "true"
  REST_ADDR        = "0.0.0.0:8082"
  PLATFORM_FEE_PCT = "8"
  # NM_ESCROW_ADDRESS — optional, set to enable on-chain Arbitrum settlement
  # NM_ORACLE_PK      — optional, oracle signing key (keep in secrets)
  # NM_ARBITRUM_RPC   — optional, Arbitrum RPC URL

[http_service]
  internal_port        = 8082
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"
